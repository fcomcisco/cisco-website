<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineer / Platform Engineer — Portfolio</title>
  <meta name="description" content="Data Engineer / Platform Engineer — cloud, data pipelines, production applications." />

  <!-- Devicon: icon font for tech-stack logos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --bg: #0b0e14;
      --bg-elevated: #11151d;
      --border: #1f2530;
      --text: #e8eaed;
      --text-muted: #9aa3b2;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.12);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --max-width: 1080px;
    }

    [data-theme="light"] {
      --bg: #f7f8fa;
      --bg-elevated: #ffffff;
      --border: #e3e6ea;
      --text: #1a1d23;
      --text-muted: #5b6472;
      --accent: #2f6fed;
      --accent-soft: rgba(47, 111, 237, 0.08);
      --shadow: 0 8px 24px rgba(20, 20, 30, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Fixed, full-page fog canvas mount. Sits behind all content (negative
       z-index) but above the plain body background, which acts as a fallback
       color while the Vanta/Three.js scripts load. */
    #vanta-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 72px 24px;
    }

    h1, h2, h3 { margin: 0; }

    a { color: inherit; }

    /* ---------- Fade-in on scroll ---------- */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Top-right controls (theme + language) ---------- */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, background 0.3s ease;
    }
    .theme-toggle:hover { transform: scale(1.08); }

    .lang-toggle {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      box-shadow: var(--shadow);
    }
    .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      min-width: 56px;
      height: 28px;
      padding: 0 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { background: var(--accent-soft); color: var(--accent); }
    .lang-btn svg {
      width: 18px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15);
    }

    /* ---------- Hero ---------- */
    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
    }
    .avatar {
      width: 176px;
      height: 176px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero .eyebrow {
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
    }
    .hero .title {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--text-muted);
      font-weight: 500;
    }
    .hero .links {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero .links a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--bg-elevated);
      transition: border-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }
    .hero .links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .hero .links svg { width: 16px; height: 16px; }

    /* ---------- Section headings ---------- */
    .section-heading {
      text-align: center;
      margin-bottom: 40px;
    }
    .section-heading h2 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
    }
    .section-heading .sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    /* ---------- Tech stack ---------- */
    .stack-category { margin-bottom: 40px; }
    .stack-category:last-child { margin-bottom: 0; }
    .stack-category .cat-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .stack-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }
    .tech-item {
      flex: 0 0 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .tech-item:hover {
      transform: scale(1.06);
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .tech-item .icon-wrap {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
    .tech-item .icon-wrap svg { width: 36px; height: 36px; }
    .tech-item .icon-wrap img { width: 36px; height: 36px; object-fit: contain; }
    .tech-item .icon-wrap .badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .tech-item .name {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ---------- Experience / Education timeline ---------- */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 640px;
      margin: 0 auto;
    }
    #experienceList { max-width: 760px; }
    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 18px 22px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .timeline-item:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .timeline-logo {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid var(--border);
      padding: 8px;
    }
    .timeline-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .timeline-logo .logo-fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
      text-align: center;
    }
    .timeline-info { text-align: left; }
    .timeline-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }
    .timeline-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .timeline-date {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 4px;
    }
    .timeline-desc {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 10px;
    }
    .timeline-highlights {
      list-style: none;
      margin: 10px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .timeline-highlights li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .timeline-highlights li .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 6px;
    }

    /* ---------- Architecture diagram ---------- */
    .diagram-wrap {
      overflow-x: auto;
      padding: 12px 4px 20px;
    }
    .diagram {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 720px;
      justify-content: center;
    }
    .diagram-node {
      flex: 1;
      min-width: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .diagram-node:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }
    .diagram-node .node-icon {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }
    .diagram-node span {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .diagram-arrow {
      flex: 0 0 auto;
      width: 28px;
      height: 12px;
      color: var(--text-muted);
    }
    .diagram-caption {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 14px;
    }

    /* ---------- Footer ---------- */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    footer .links a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.2s ease;
    }
    footer .links a:hover { color: var(--accent); }
    footer .links svg { width: 15px; height: 15px; }

    @media (max-width: 640px) {
      section { padding: 56px 18px; }
      .diagram { min-width: 640px; }
      .avatar { width: 136px; height: 136px; }
      /* Keep centered heading text clear of the fixed controls box in the corner */
      .section-heading { padding: 0 58px; }
    }
  </style>
</head>
<body>

  <div id="vanta-bg"></div>

  <div class="controls">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">🌙</button>
    <div class="lang-toggle" id="langToggle">
      <button class="lang-btn" data-lang="en" aria-label="English">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#fff"/><g fill="#B22234"><rect y="0" width="24" height="1.23"/><rect y="2.46" width="24" height="1.23"/><rect y="4.92" width="24" height="1.23"/><rect y="7.38" width="24" height="1.23"/><rect y="9.84" width="24" height="1.23"/><rect y="12.3" width="24" height="1.23"/><rect y="14.76" width="24" height="1.23"/></g><rect width="10" height="8.6" fill="#3C3B6E"/></svg>
        <span>EN</span>
      </button>
      <button class="lang-btn" data-lang="es" aria-label="Español">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#AA151B"/><rect y="4" width="24" height="8" fill="#F1BF00"/></svg>
        <span>ES</span>
      </button>
      <button class="lang-btn" data-lang="de" aria-label="Deutsch">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#FFCE00"/><rect width="24" height="10.67" fill="#DD0000"/><rect width="24" height="5.33" fill="#000"/></svg>
        <span>DE</span>
      </button>
    </div>
  </div>

  <!-- ============ HERO ============ -->
  <section class="hero fade-in" id="hero">
    <div class="hero-content">
      <div class="avatar">
        <img src="assets/profile.png" alt="Profile photo" id="avatarImg" onerror="this.closest('.avatar').style.display='none'" />
      </div>
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroName"></h1>
      <div class="title" id="heroTitle"></div>
      <div class="links" id="heroLinks"></div>
    </div>
  </section>

  <!-- ============ TECH STACK ============ -->
  <section id="stack">
    <div class="section-heading fade-in">
      <h2 id="stackHeading"></h2>
      <div class="sub" id="stackSub"></div>
    </div>
    <div id="stackContainer"></div>
  </section>

  <!-- ============ EXPERIENCE ============ -->
  <section id="experience">
    <div class="section-heading fade-in">
      <h2 id="experienceHeading"></h2>
    </div>
    <div class="timeline" id="experienceList"></div>
  </section>

  <!-- ============ EDUCATION ============ -->
  <section id="education">
    <div class="section-heading fade-in">
      <h2 id="educationHeading"></h2>
    </div>
    <div class="timeline" id="educationList"></div>
  </section>

  <!-- ============ ARCHITECTURE ============ -->
  <section id="architecture">
    <div class="section-heading fade-in">
      <h2 id="archHeading"></h2>
    </div>
    <div class="diagram-wrap fade-in">
      <div class="diagram" id="diagram"></div>
    </div>
    <div class="diagram-caption fade-in" id="archCaption"></div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="links" id="footerLinks"></div>
    <div id="footerCopy"></div>
  </footer>

  <!-- Three.js + Vanta.js (fog effect) for the hero background -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>

  <script>

    let currentLang = localStorage.getItem("lang") || "en";
    if (!TRANSLATIONS[currentLang]) currentLang = "en";

    /* =====================================================================

    // Maps architecture node keys (CONFIG.architecture) to an icon key in ICONS.
    const ARCH_ICON_MAP = {
      source: "source",
      airflow: "airflow",
      service: "service",
      db: "genericDb",
      frontend: "frontend",
    };

    /* =====================================================================
       RENDER
       ===================================================================== */
    function renderHero() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("heroEyebrow").textContent = t.eyebrow;
      document.getElementById("heroName").textContent = CONFIG.name;
      document.getElementById("heroTitle").textContent = t.title;
      document.getElementById("avatarImg").src = CONFIG.avatar;

      const linksHtml = `
        <a href="${CONFIG.links.linkedin}" target="_blank" rel="noopener">${ICONS.linkedin} ${t.linkedinLabel}</a>
        <a href="${CONFIG.links.email}">${ICONS.email} ${t.emailLabel}</a>
      `;
      document.getElementById("heroLinks").innerHTML = linksHtml;
      document.getElementById("footerLinks").innerHTML = linksHtml;
      document.getElementById("footerCopy").textContent =
        `© ${new Date().getFullYear()} ${CONFIG.name}`;
    }

    // Builds the icon markup for one tech item, in priority order:
    // devicon class -> inline svg key -> text badge -> initials fallback.
    function techIconMarkup(tech) {
      if (tech.iconClass) {
        return `<i class="${tech.iconClass}"></i>`;
      }
      if (tech.svg && ICONS[tech.svg]) {
        return ICONS[tech.svg];
      }
      const label = tech.badge || tech.name.slice(0, 2).toUpperCase();
      if (tech.img) {
        return `<img src="${tech.img}" alt="${tech.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" /><div class="badge" style="display:none;">${label}</div>`;
      }
      return `<div class="badge">${label}</div>`;
    }

    function renderStack() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("stackHeading").textContent = t.stackHeading;
      document.getElementById("stackSub").textContent = t.stackSub;

      const container = document.getElementById("stackContainer");
      container.innerHTML = CONFIG.categoryOrder
        .map((key) => {
          const items = CONFIG.techStack.filter((i) => i.categoryKey === key);
          if (!items.length) return "";
          const itemsHtml = items
            .map(
              (i) => `
              <div class="tech-item">
                <div class="icon-wrap">${techIconMarkup(i)}</div>
                <div class="name">${i.name}</div>
              </div>`
            )
            .join("");
          return `
            <div class="stack-category fade-in">
              <div class="cat-label">${t.categories[key]}</div>
              <div class="stack-grid">${itemsHtml}</div>
            </div>`;
        })
        .join("");
    }

    // Shared markup for one experience/education row: a logo (with a text
    // badge fallback if the image file is missing) plus title/sub/date lines,
    // and optional extra HTML (description paragraph, highlight bullets).
    function timelineItemMarkup(logo, badge, title, sub, date, extraHtml = "") {
      return `
        <div class="timeline-item fade-in">
          <div class="timeline-logo">
            <img src="${logo}" alt="${title} logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="logo-fallback">${badge}</div>
          </div>
          <div class="timeline-info">
            <div class="timeline-title">${title}</div>
            <div class="timeline-sub">${sub}</div>
            ${date ? `<div class="timeline-date">${date}</div>` : ""}
            ${extraHtml}
          </div>
        </div>`;
    }

    function renderExperience() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("experienceHeading").textContent = t.experienceHeading;
      document.getElementById("experienceList").innerHTML = CONFIG.experience
        .map((exp, i) => {
          const entry = t.experienceEntries[i];
          const highlightsHtml = entry.highlights
            .map((h) => `<li><span class="dot"></span>${h}</li>`)
            .join("");
          const extra = `
            <p class="timeline-desc">${entry.description}</p>
            <ul class="timeline-highlights">${highlightsHtml}</ul>
          `;
          return timelineItemMarkup(
            exp.logo,
            exp.badge,
            entry.role,
            `${exp.company} · ${entry.client} · ${entry.location}`,
            entry.dateRange,
            extra
          );
        })
        .join("");
    }

    function renderEducation() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("educationHeading").textContent = t.educationHeading;
      document.getElementById("educationList").innerHTML = CONFIG.education
        .map((edu, i) => {
          const entry = t.educationEntries[i];
          return timelineItemMarkup(
            edu.logo,
            edu.badge,
            entry.degree,
            `${entry.school} · ${entry.location}`
          );
        })
        .join("");
    }

    function renderArchitecture() {
      const t = TRANSLATIONS[currentLang];
      document.getElementById("archHeading").textContent = t.archHeading;
      document.getElementById("archCaption").textContent = t.archCaption;

      const nodes = CONFIG.architecture
        .map((key, i) => {
          const node = `
            <div class="diagram-node">
              <div class="node-icon">${ICONS[ARCH_ICON_MAP[key]]}</div>
              <span>${t.archLabels[key]}</span>
            </div>`;
          const arrow =
            i < CONFIG.architecture.length - 1
              ? `<div class="diagram-arrow">${ICONS.arrow}</div>`
              : "";
          return node + arrow;
        })
        .join("");
      document.getElementById("diagram").innerHTML = nodes;
    }

    // Re-renders all translatable sections for the current language.
    function renderAll() {
      renderHero();
      renderStack();
      renderExperience();
      renderEducation();
      renderArchitecture();
    }

    /* =====================================================================
       THEME TOGGLE (persisted via localStorage)
       ===================================================================== */
    function initTheme() {
      const saved = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", saved);
      updateToggleIcon(saved);
      initVanta(saved);

      document.getElementById("themeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateToggleIcon(next);
        initVanta(next);
      });
    }

    function updateToggleIcon(theme) {
      document.getElementById("themeToggle").textContent = theme === "dark" ? "🌙" : "☀️";
    }

    /* =====================================================================
       VANTA FOG BACKGROUND (fixed, full-page; recolored per theme)
       ===================================================================== */
    const VANTA_PALETTES = {
      dark: {
        highlightColor: 0x4f7fe0,
        midtoneColor: 0x1c2b4a,
        lowlightColor: 0x0b0e14,
        baseColor: 0x0b0e14,
      },
      light: {
        highlightColor: 0x2f6fed,
        midtoneColor: 0x8fb8ff,
        lowlightColor: 0xd8e6ff,
        baseColor: 0xf7f8fa,
      },
    };

    let vantaEffect = null;

    function initVanta(theme) {
      if (!window.VANTA || !window.VANTA.FOG) return;
      if (vantaEffect) vantaEffect.destroy();
      vantaEffect = window.VANTA.FOG({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        blurFactor: 0.6,
        speed: 1.4,
        zoom: 1.2,
        ...VANTA_PALETTES[theme],
      });
    }

    /* =====================================================================
       LANGUAGE TOGGLE (persisted via localStorage)
       ===================================================================== */
    function initLang() {
      document.documentElement.setAttribute("lang", currentLang);
      updateLangButtons();

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentLang = btn.dataset.lang;
          localStorage.setItem("lang", currentLang);
          document.documentElement.setAttribute("lang", currentLang);
          updateLangButtons();
          renderAll();
          // Re-rendered sections lose their scroll-triggered "visible" class;
          // since this is a language switch (not a first paint), reveal them
          // immediately instead of waiting for another scroll.
          document.querySelectorAll(".fade-in").forEach((el) => el.classList.add("visible"));
        });
      });
    }

    function updateLangButtons() {
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === currentLang);
      });
    }

    /* =====================================================================
       FADE-IN ON SCROLL
       ===================================================================== */
    function initScrollFade() {
      const targets = document.querySelectorAll(".fade-in");
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15 }
      );
      targets.forEach((el) => observer.observe(el));
    }

    /* =====================================================================
       INIT
       ===================================================================== */
    renderAll();
    initTheme();
    initLang();
    initScrollFade();
  </script>
