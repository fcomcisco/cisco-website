<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineer / Platform Engineer — Portfolio</title>
  <meta name="description" content="Data Engineer / Platform Engineer — cloud, data pipelines, production applications." />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <!-- Open Graph / social sharing preview -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fcomcisco.github.io/cisco-website/" />
  <meta property="og:title" content="Francisco Montecinos — Software Engineer" />
  <meta property="og:description" content="Data Engineer / Platform Engineer — cloud, data pipelines, production applications." />
  <meta property="og:image" content="https://fcomcisco.github.io/cisco-website/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Francisco Montecinos — Software Engineer" />
  <meta name="twitter:description" content="Data Engineer / Platform Engineer — cloud, data pipelines, production applications." />
  <meta name="twitter:image" content="https://fcomcisco.github.io/cisco-website/og-image.png" />

  <!-- Devicon: icon font for tech-stack logos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="vanta-bg"></div>

  <div class="controls">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">🌙</button>
    <div class="lang-toggle" id="langToggle">
      <button class="lang-btn" data-lang="en" aria-label="English">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#fff"/><g fill="#B22234"><rect y="0" width="24" height="1.23"/><rect y="2.46" width="24" height="1.23"/><rect y="4.92" width="24" height="1.23"/><rect y="7.38" width="24" height="1.23"/><rect y="9.84" width="24" height="1.23"/><rect y="12.3" width="24" height="1.23"/><rect y="14.76" width="24" height="1.23"/></g><rect width="10" height="8.6" fill="#3C3B6E"/></svg>
        <span>EN</span>
      </button>
      <button class="lang-btn" data-lang="es" aria-label="Español">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#AA151B"/><rect y="4" width="24" height="8" fill="#F1BF00"/></svg>
        <span>ES</span>
      </button>
      <button class="lang-btn" data-lang="de" aria-label="Deutsch">
        <svg viewBox="0 0 24 16"><rect width="24" height="16" fill="#FFCE00"/><rect width="24" height="10.67" fill="#DD0000"/><rect width="24" height="5.33" fill="#000"/></svg>
        <span>DE</span>
      </button>
    </div>
  </div>

  <!-- ============ HERO ============ -->
  <section class="hero fade-in" id="hero">
    <div class="hero-content">
      <div class="avatar">
        <img src="assets/profile.png" alt="Profile photo" id="avatarImg" onerror="this.closest('.avatar').style.display='none'" />
      </div>
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroName"></h1>
      <div class="title" id="heroTitle"></div>
      <div class="location" id="heroLocation"></div>
      <div class="links" id="heroLinks"></div>
    </div>
  </section>

  <!-- ============ ABOUT ============ -->
  <section id="about">
    <div class="section-heading fade-in">
      <h2 id="aboutHeading"></h2>
    </div>
    <p class="about-text fade-in" id="aboutText"></p>
  </section>

  <!-- ============ TECH STACK ============ -->
  <section id="stack">
    <div class="section-heading fade-in">
      <h2 id="stackHeading"></h2>
      <div class="sub" id="stackSub"></div>
    </div>
    <div id="stackContainer"></div>
  </section>

  <!-- ============ EXPERIENCE ============ -->
  <section id="experience">
    <div class="section-heading fade-in">
      <h2 id="experienceHeading"></h2>
    </div>
    <div class="timeline" id="experienceList"></div>
  </section>

  <!-- ============ EDUCATION ============ -->
  <section id="education">
    <div class="section-heading fade-in">
      <h2 id="educationHeading"></h2>
    </div>
    <div class="timeline" id="educationList"></div>
  </section>

  <!-- ============ ARCHITECTURE ============ -->
  <section id="architecture">
    <div class="section-heading fade-in">
      <h2 id="archHeading"></h2>
    </div>
    <div class="diagram-wrap fade-in">
      <div class="diagram" id="diagram"></div>
    </div>
    <div class="diagram-caption fade-in" id="archCaption"></div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="links" id="footerLinks"></div>
    <div id="footerCopy"></div>
  </footer>

  <!-- Three.js + Vanta.js (fog effect) for the hero background -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
