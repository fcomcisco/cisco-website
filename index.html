<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineer / Platform Engineer — Portfolio</title>
  <meta name="description" content="Data Engineer / Platform Engineer — cloud, data pipelines, production applications." />

  <!-- Devicon: icon font for tech-stack logos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --bg: #0b0e14;
      --bg-elevated: #11151d;
      --border: #1f2530;
      --text: #e8eaed;
      --text-muted: #9aa3b2;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.12);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --max-width: 1080px;
    }

    [data-theme="light"] {
      --bg: #f7f8fa;
      --bg-elevated: #ffffff;
      --border: #e3e6ea;
      --text: #1a1d23;
      --text-muted: #5b6472;
      --accent: #2f6fed;
      --accent-soft: rgba(47, 111, 237, 0.08);
      --shadow: 0 8px 24px rgba(20, 20, 30, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      transition: background 0.3s ease, color 0.3s ease;
    }

    section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 72px 24px;
    }

    h1, h2, h3 { margin: 0; }

    a { color: inherit; }

    /* ---------- Fade-in on scroll ---------- */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Theme toggle ---------- */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, background 0.3s ease;
    }
    .theme-toggle:hover { transform: scale(1.08); }

    /* ---------- Hero ---------- */
    .hero {
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }
    .hero .eyebrow {
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
    }
    .hero .title {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--text-muted);
      font-weight: 500;
    }
    .hero .links {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero .links a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--bg-elevated);
      transition: border-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }
    .hero .links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .hero .links svg { width: 16px; height: 16px; }

    /* ---------- Section headings ---------- */
    .section-heading {
      text-align: center;
      margin-bottom: 40px;
    }
    .section-heading h2 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
    }
    .section-heading .sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    /* ---------- Tech stack ---------- */
    .stack-category { margin-bottom: 40px; }
    .stack-category:last-child { margin-bottom: 0; }
    .stack-category .cat-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .stack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 18px;
    }
    .tech-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .tech-item:hover {
      transform: scale(1.06);
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .tech-item .icon-wrap {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
    .tech-item .icon-wrap svg { width: 36px; height: 36px; }
    .tech-item .icon-wrap .badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .tech-item .name {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ---------- Work areas ---------- */
    .work-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .work-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      font-size: 0.92rem;
    }
    .work-list li .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ---------- Architecture diagram ---------- */
    .diagram-wrap {
      overflow-x: auto;
      padding: 12px 4px 20px;
    }
    .diagram {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 720px;
      justify-content: center;
    }
    .diagram-node {
      flex: 1;
      min-width: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .diagram-node:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }
    .diagram-node .node-icon {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }
    .diagram-node span {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .diagram-arrow {
      flex: 0 0 auto;
      width: 28px;
      height: 12px;
      color: var(--text-muted);
    }
    .diagram-caption {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 14px;
    }

    /* ---------- Footer ---------- */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    footer .links a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.2s ease;
    }
    footer .links a:hover { color: var(--accent); }
    footer .links svg { width: 15px; height: 15px; }

    @media (max-width: 640px) {
      section { padding: 56px 18px; }
      .diagram { min-width: 640px; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">🌙</button>

  <!-- ============ HERO ============ -->
  <section class="hero fade-in" id="hero">
    <div class="eyebrow">Portfolio</div>
    <h1 id="heroName"></h1>
    <div class="title" id="heroTitle"></div>
    <div class="links" id="heroLinks"></div>

      <h2>Tech Stack</h2>

    </div>

  </section>

    <div class="section-heading fade-in">
      <h2>Work Areas</h2>
    </div>
    <ul class="work-list fade-in" id="workList"></ul>
  </section>

    <div class="section-heading fade-in">

    </div>
    <div class="diagram-wrap fade-in">
      <div class="diagram" id="diagram"></div>
    </div>
    <div class="diagram-caption fade-in">Deployed on AWS · CI/CD via Docker + Azure Pipelines</div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="links" id="footerLinks"></div>
    <div id="footerCopy"></div>
  </footer>

    /* =====================================================================
       RENDER
       ===================================================================== */
    function renderHero() {
      document.getElementById("heroName").textContent = CONFIG.name;
      document.getElementById("heroTitle").textContent = CONFIG.title;

      const linksHtml = `
        <a href="${CONFIG.links.linkedin}" target="_blank" rel="noopener">${ICONS.linkedin} LinkedIn</a>
        <a href="${CONFIG.links.email}">${ICONS.email} Email</a>
      `;
      document.getElementById("heroLinks").innerHTML = linksHtml;
      document.getElementById("footerLinks").innerHTML = linksHtml;
      document.getElementById("footerCopy").textContent =
        `© ${new Date().getFullYear()} ${CONFIG.name}`;
    }

    // Builds the icon markup for one tech item, in priority order:
    // devicon class -> inline svg key -> text badge -> initials fallback.
    function techIconMarkup(tech) {
      if (tech.iconClass) {
        return `<i class="${tech.iconClass}"></i>`;
      }
      if (tech.svg && ICONS[tech.svg]) {
        return ICONS[tech.svg];
      }
      const label = tech.badge || tech.name.slice(0, 2).toUpperCase();
      return `<div class="badge">${label}</div>`;
    }

    function renderStack() {
      const categories = [];
      CONFIG.techStack.forEach((t) => {
        if (!categories.includes(t.category)) categories.push(t.category);
      });

      const container = document.getElementById("stackContainer");
      container.innerHTML = categories
        .map((cat) => {
          const items = CONFIG.techStack.filter((t) => t.category === cat);
          const itemsHtml = items
            .map(
              (t) => `
              <div class="tech-item">
                <div class="icon-wrap">${techIconMarkup(t)}</div>
                <div class="name">${t.name}</div>
              </div>`
            )
            .join("");
          return `
            <div class="stack-category fade-in">
              <div class="cat-label">${cat}</div>
              <div class="stack-grid">${itemsHtml}</div>
            </div>`;
        })
        .join("");
    }

    function renderWorkAreas() {
      document.getElementById("workList").innerHTML = CONFIG.workAreas
        .map((item) => `<li><span class="dot"></span>${item}</li>`)
        .join("");
    }

    function renderArchitecture() {
      const nodes = CONFIG.architecture
        .map((label, i) => {
          const iconKey = ARCH_ICON_MAP[label] || "service";
          const node = `
            <div class="diagram-node">
              <div class="node-icon">${ICONS[iconKey]}</div>
              <span>${label}</span>
            </div>`;
          const arrow =
            i < CONFIG.architecture.length - 1
              ? `<div class="diagram-arrow">${ICONS.arrow}</div>`
              : "";
          return node + arrow;
        })
        .join("");
      document.getElementById("diagram").innerHTML = nodes;
    }

    /* =====================================================================
       THEME TOGGLE (persisted via localStorage)
       ===================================================================== */
    function initTheme() {
      const saved = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", saved);
      updateToggleIcon(saved);

      document.getElementById("themeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateToggleIcon(next);
      });
    }

    function updateToggleIcon(theme) {
      document.getElementById("themeToggle").textContent = theme === "dark" ? "🌙" : "☀️";
    }

    /* =====================================================================
       FADE-IN ON SCROLL
       ===================================================================== */
    function initScrollFade() {
      const targets = document.querySelectorAll(".fade-in");
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15 }
      );
      targets.forEach((el) => observer.observe(el));
    }

    /* =====================================================================
       INIT
       ===================================================================== */
    renderHero();
    renderStack();
    renderWorkAreas();
    renderArchitecture();
    initTheme();
    initScrollFade();
  </script>
</body>
</html>
